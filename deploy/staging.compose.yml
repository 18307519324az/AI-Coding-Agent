name: ai-coding-agent-staging

services:
  runner:
    build:
      context: ..
      dockerfile: deploy/runner.Dockerfile
    environment:
      RUNNER_HOST: 0.0.0.0
      RUNNER_PORT: 8787
      RUNNER_API_KEY: ${RUNNER_API_KEY:?set RUNNER_API_KEY}
      OPENAI_AGENT_MODE: ${OPENAI_AGENT_MODE:-deterministic}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.2}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_PR_MODE: ${GITHUB_PR_MODE:-simulated}
      RUNNER_EXECUTION_MODE: ${RUNNER_EXECUTION_MODE:-mock}
      RUNNER_JOB_MODE: ${RUNNER_JOB_MODE:-queued}
      RUNNER_JOB_WORKER_INTERVAL_MS: ${RUNNER_JOB_WORKER_INTERVAL_MS:-1000}
      RUNNER_JOB_WORKER_CONCURRENCY: ${RUNNER_JOB_WORKER_CONCURRENCY:-1}
      RUNNER_JOB_MAX_ATTEMPTS: ${RUNNER_JOB_MAX_ATTEMPTS:-3}
      RUNNER_JOB_RETRY_BACKOFF_MS: ${RUNNER_JOB_RETRY_BACKOFF_MS:-1000}
      WORKSPACE_ROOT: /app/.workspaces
      RUNNER_STORE_FILE: /app/.runner-data/store.json
      RUNNER_ARTIFACT_DIR: /app/.runner-data/artifacts
      RUNNER_WORKSPACE_RETENTION_HOURS: ${RUNNER_WORKSPACE_RETENTION_HOURS:-168}
      RUNNER_WORKSPACE_CLEANUP_INTERVAL_MS: ${RUNNER_WORKSPACE_CLEANUP_INTERVAL_MS:-3600000}
      RUNNER_WORKSPACE_CLEANUP: ${RUNNER_WORKSPACE_CLEANUP:-enabled}
    ports:
      - "${RUNNER_PORT:-8787}:8787"
    volumes:
      - runner-workspaces:/app/.workspaces
      - runner-data:/app/.runner-data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6

  web:
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
    depends_on:
      runner:
        condition: service_healthy
    environment:
      RUNNER_API_URL: http://runner:8787
      RUNNER_API_KEY: ${RUNNER_API_KEY:?set RUNNER_API_KEY}
      WEB_AUTH_USERNAME: ${WEB_AUTH_USERNAME:-admin}
      WEB_AUTH_PASSWORD: ${WEB_AUTH_PASSWORD:?set WEB_AUTH_PASSWORD}
      WEB_AUTH_SESSION_SECRET: ${WEB_AUTH_SESSION_SECRET:?set WEB_AUTH_SESSION_SECRET}
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  runner-workspaces:
  runner-data:
